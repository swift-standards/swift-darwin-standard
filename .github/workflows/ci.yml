name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-institute/.github/.github/workflows/swift-ci.yml
  ci:
    uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
    with:
      cache-key-prefix: swift63-spm-v1
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

  # DocC umbrella-catalog pipeline per [DOC-019a] — see
  # swift-institute/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@main
    with:
      umbrella-module: Darwin_Kernel_Standard
      umbrella-display-name: "Darwin Kernel Standard"
      umbrella-bundle-id: "swift-darwin-standard.Darwin-Kernel-Standard"
      umbrella-docc-path: "Sources/Darwin Kernel Standard/Darwin Kernel Standard.docc"
      exclude-modules: "Darwin_Kernel_Standard_Test_Support"
      enable-private-repos: true
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
