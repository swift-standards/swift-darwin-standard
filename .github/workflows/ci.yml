name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-standards/.github/.github/workflows/swift-ci.yml (layer wrapper)
  ci:
    uses: swift-standards/.github/.github/workflows/swift-ci.yml@main
    # [CI-114] Platform identity: Darwin-specification package. Windows has no Darwin
    # surface to specify, so that leg can only ever be red. Linux is RETAINED — its
    # Swift 6.3 and 6.4-nightly legs are genuinely green today, and a green leg is
    # never retired to buy a tidier matrix.
    with:
      platform-support: apple,linux
    secrets: inherit

  # DocC umbrella-catalog pipeline per [DOC-019a] — see
  # swift-standards/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-standards/.github/.github/workflows/swift-docs.yml@main
    secrets: inherit
